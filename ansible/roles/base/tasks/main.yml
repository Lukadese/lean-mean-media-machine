---
- name: Apply system updates
  ansible.builtin.apt:
    update_cache: true
    upgrade: safe

- name: Install base software
  ansible.builtin.apt:
    name: [curl, git, mergerfs, restic, ufw, unattended-upgrades]
    state: present

# Security patches install themselves; everything else stays under Git control
- name: Enable automatic security updates
  ansible.builtin.copy:
    dest: /etc/apt/apt.conf.d/20auto-upgrades
    content: |
      APT::Periodic::Update-Package-Lists "1";
      APT::Periodic::Unattended-Upgrade "1";
    mode: '0644'

- name: Download Tailscale install script
  ansible.builtin.get_url:
    url: https://tailscale.com/install.sh
    dest: /tmp/install-tailscale.sh
    mode: '0700'

- name: Install Tailscale VPN via script
  ansible.builtin.command: /tmp/install-tailscale.sh
  args:
    creates: /usr/bin/tailscale

# The auth key is only needed (and only valid) for the initial login. Checking
# first keeps redeploys working after the key expires.
- name: Check whether Tailscale is already connected
  ansible.builtin.command: tailscale status
  register: base_ts_status
  changed_when: false
  failed_when: false

- name: Bring Tailscale up (first run only)
  ansible.builtin.command: tailscale up --authkey={{ tailscale_key }}
  when: base_ts_status.rc != 0
  changed_when: true
  no_log: true

- name: UFW - allow SSH (rate-limited to avoid lockout)
  community.general.ufw:
    rule: limit
    port: '22'
    proto: tcp

- name: UFW - trust the Tailscale interface fully
  community.general.ufw:
    rule: allow
    interface: tailscale0
    direction: in

- name: UFW - allow access from the local network
  community.general.ufw:
    rule: allow
    src: "{{ lan_subnet }}"

- name: UFW - set default policy and enable the firewall
  community.general.ufw:
    state: enabled
    policy: deny
    direction: incoming

- name: Create mount points for the data disks and the storage pool
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: "{{ puid }}"
    group: "{{ pgid }}"
    mode: '0775'
  loop: "{{ (data_disks | map(attribute='path') | list) + [storage_merged] }}"

- name: Mount the data disks
  ansible.posix.mount:
    path: "{{ item.path }}"
    src: "{{ item.id }}"
    fstype: "{{ item.fstype | default('ext4') }}"
    opts: defaults,noatime
    state: mounted
  loop: "{{ data_disks }}"

- name: Configure the MergerFS pool
  ansible.posix.mount:
    path: "{{ storage_merged }}"
    src: "{{ data_disks | map(attribute='path') | join(':') }}"
    fstype: fuse.mergerfs
    # requires-mounts-for makes MergerFS mount only after the data disks are mounted (prevents an empty pool after reboot)
    opts: >-
      cache.files=partial,dropcacheonclose=true,category.create=epmfs,{{
      data_disks | map(attribute='path') | map('regex_replace', '^', 'x-systemd.requires-mounts-for=') | join(',') }}
    state: mounted

- name: Configure backups
  when: backup_enabled | bool
  block:
    - name: Create mount point for the backup drive
      ansible.builtin.file:
        path: "{{ backup_usb.path }}"
        state: directory
        mode: '0755'
      when: backup_usb is defined

    - name: Mount the backup drive permanently (nofail avoids boot issues)
      ansible.posix.mount:
        path: "{{ backup_usb.path }}"
        src: "{{ backup_usb.id }}"
        fstype: "{{ backup_usb.fstype | default('ext4') }}"
        opts: defaults,nofail
        state: mounted
      when: backup_usb is defined

    - name: Create the scripts directory
      ansible.builtin.file:
        path: /opt/scripts
        state: directory
        mode: '0755'

    - name: Deploy the Restic backup script
      ansible.builtin.template:
        src: backup.sh.j2
        dest: /opt/scripts/backup.sh
        mode: '0700'

    - name: Deploy the Restic restore script
      ansible.builtin.template:
        src: restore.sh.j2
        dest: /opt/scripts/restore.sh
        mode: '0700'

    - name: Deploy the Restic verification script
      ansible.builtin.template:
        src: check.sh.j2
        dest: /opt/scripts/check.sh
        mode: '0700'

    - name: Schedule the daily Restic backup via cron
      ansible.builtin.cron:
        name: "Daily Restic Backup"
        minute: "0"
        hour: "4"
        job: "/bin/bash /opt/scripts/backup.sh >> /var/log/restic.log 2>&1"
        user: root

    - name: Schedule the weekly backup verification via cron
      ansible.builtin.cron:
        name: "Weekly Restic Check"
        minute: "0"
        hour: "5"
        weekday: "0"
        job: "/bin/bash /opt/scripts/check.sh >> /var/log/restic.log 2>&1"
        user: root
