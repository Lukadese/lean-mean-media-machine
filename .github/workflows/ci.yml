name: IaC Pipeline
on: [push, pull_request]
jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Test Docker Compose Syntax
        # --profile "*" also validates the optional profile-gated services
        run: docker compose -f compose/docker-compose.yml --profile "*" config -q
      - name: Install Ansible Lint
        run: pip install ansible-lint
      - name: Install required Ansible collections
        run: ansible-galaxy collection install ansible.posix community.docker community.general
      - name: Lint Playbooks
        run: ansible-lint ansible/site.yml
