name: 💡 Feature request
description: Suggest an improvement or a new capability
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Ideas are welcome! Changes are judged against the three project goals:
        **plug and play**, **generic** (any disk layout, any VPN) and **low maintenance**.
  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: Describe the situation where the current setup falls short.
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What would you like to happen? Alternatives you considered are welcome too.
    validations:
      required: true
  - type: textarea
    id: fit
    attributes:
      label: How does it fit the project goals?
      description: Does it stay plug-and-play, generic and low-maintenance? Any trade-offs?
  - type: checkboxes
    id: checks
    attributes:
      label: Before submitting
      options:
        - label: I searched existing issues and discussions for this idea
          required: true
